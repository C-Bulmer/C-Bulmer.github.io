# -----------------------------------------------------------------------------
# ⚙️ Site Settings
# -----------------------------------------------------------------------------

title: Cormac Bulmer Portfolio
email: cormacb0621@gmail.com
description: >-
  Links to my various accounts and some of my bigger projects

# Branding & Social
github_username: C-Bulmer 

# -----------------------------------------------------------------------------
# 🛠️ Build Settings
# -----------------------------------------------------------------------------

baseurl: "" 
url: "C-Bulmer.github.io"

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"
# Removed include: ["_pages"] to avoid collection conflicts

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

# -----------------------------------------------------------------------------
# 🎨 Theme Settings
# -----------------------------------------------------------------------------

minimal_mistakes_skin: "aqua"
site_author: "Cormac Bulmer"
paginate: 5
words_per_minute: 200

# Masthead (Top Navigation) Settings
logo: 
masthead_title: "Cormac Bulmer Portfolio"

# Defaults for Posts and Pages
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      header:
        overlay_color: "#e8025a"
        overlay_image:    
      author_profile: true # Author profile (left sidebar) is visible
      toc: true             # Table of Contents (right sidebar) is visible
      toc_label: "Contents" # Optional: Custom title for the TOC
      toc_icon: "book"      # Optional: FontAwesome icon
      toc_sticky: true      # This makes it stick to the sidebar
  
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      header:
        overlay_color: "#e8025a"
        overlay_image: 
      author_profile: true # Author profile (left sidebar) is visible
      toc: true             # Table of Contents (right sidebar) is visible
      toc_label: "Contents" # Optional: Custom title for the TOC
      toc_icon: "book"      # Optional: FontAwesome icon
      toc_sticky: true      # This makes it stick to the sidebar
 
  - scope:
      path: ""
      type: portfolio # Matches the collection name above
    values:
      layout: portfolio-item
      header:
        overlay_color: "#e8025a"
        overlay_image:
      author_profile: true # Author profile (left sidebar) is visible
      sidebar: 
        nav: "portfolio_sidebar"  # Custom Portfolio (left sidebar) is visible
      toc: true # Table of Contents (right sidebar) is visible

include:
  - _pages
      
# -----------------------------------------------------------------------------
# 📂 Collections Settings 
# -----------------------------------------------------------------------------

collections:
  portfolio:
    output: true
    permalink: /portfolio/:path/

# -----------------------------------------------------------------------------
# 👤 Author Settings
# -----------------------------------------------------------------------------

author:
  name   : "Cormac Bulmer"
  avatar : "/assets/images/PFP.png"
  bio    : "Aspiring Game Designer from Tulsa, Oklahoma"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/cormac-bulmer-222ba1335/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/C-Bulmer"  
    - label: "Itch.io"
      icon: "fab fa-fw fa-itch-io"
      url: "https://damp-weasel.itch.io/"
    - label: "ArtStation"
      icon: "fab fa-fw fa-artstation"
      url: "https://dampweasel.artstation.com/"

# -----------------------------------------------------------------------------
# 🚫 Exclusions
# -----------------------------------------------------------------------------

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .jekyll-cache
  - .jekyll-metadata
